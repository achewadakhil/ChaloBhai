# ============================================================
#  ChaloBhai Server – Application Configuration
# ============================================================

spring.application.name=chalobhai-server
server.port=8080

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/chalobhai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${SQL_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=ChaloBhaiJwtSecretKeyForStudentsAndCareerRoadmaps2026
app.jwt.expiration-ms=86400000

# ── Logging ──────────────────────────────────────────────────
logging.level.com.chalobhai=DEBUG
logging.level.org.springframework.web=INFO
